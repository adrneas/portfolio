<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Simpool landing page hero cover">
  <defs>
    <linearGradient id="page-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f3f8ff"/>
      <stop offset=".42" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff6ef"/>
    </linearGradient>
    <radialGradient id="cool-glow" cx=".15" cy=".14" r=".55">
      <stop offset="0" stop-color="#e8f2ff" stop-opacity=".95"/>
      <stop offset=".58" stop-color="#eef5ff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm-glow" cx=".77" cy=".72" r=".56">
      <stop offset="0" stop-color="#fff3e8" stop-opacity=".88"/>
      <stop offset=".55" stop-color="#fff8f1" stop-opacity=".44"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="text-soften" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation=".55" flood-color="#0b0b0b" flood-opacity=".12"/>
    </filter>
    <filter id="pill-shadow" x="-12%" y="-32%" width="124%" height="164%">
      <feDropShadow dx="0" dy="9" stdDeviation="14" flood-color="#1b1b1b" flood-opacity=".05"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#page-bg)"/>
  <rect width="1200" height="800" fill="url(#cool-glow)"/>
  <rect width="1200" height="800" fill="url(#warm-glow)"/>

  <g transform="translate(47 34)">
    <rect width="29" height="29" rx="8" fill="#ff5c00"/>
    <text x="14.5" y="20.2" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle">S</text>
    <text x="38" y="21.5" fill="#1c1c1c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" filter="url(#text-soften)">SIMPOOL</text>
  </g>

  <g fill="#1f1f1f" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="540" filter="url(#text-soften)">
    <text x="471" y="57">Soluções</text>
    <text x="556" y="57">Recursos</text>
    <text x="641" y="57">Preços</text>
    <text x="994" y="57">Login</text>
  </g>

  <g transform="translate(1042 25)">
    <rect width="120" height="37" rx="18.5" fill="#1c1c1c"/>
    <text x="60" y="24.5" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle">Entrar Agora</text>
  </g>

  <g transform="translate(459 216)" filter="url(#pill-shadow)">
    <rect width="292" height="31" rx="15.5" fill="#ffffff" stroke="#e9e9e9"/>
    <path d="M20 21.5h7.2m-3.6-7.2v7.2m0 0-5 5m9.8-2.8 2.5 2.5m1.7-14.5h4.2m-2.1-2.1v4.2m-14.4 6.5H17m1.65-1.65v3.3" fill="none" stroke="#ff5c00" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="31.6" cy="16.2" r="1.65" fill="#ff5c00"/>
    <text x="49" y="21.5" fill="#747474" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="560">Sua comunicação em perfeita sincronia</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="80" font-weight="900" letter-spacing="-2.2" filter="url(#text-soften)">
    <text x="600" y="378" fill="#1c1c1c" text-anchor="middle">WhatsApp, E-mail e</text>
    <text x="466" y="468" fill="#1c1c1c" text-anchor="middle">SMS em um</text>
    <text x="842" y="468" fill="#ff7130" text-anchor="middle">único</text>
    <text x="600" y="559" fill="#ff5c19" text-anchor="middle">fluxo<tspan fill="#1c1c1c">.</tspan></text>
  </g>

  <g fill="#808080" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="450" letter-spacing=".1" text-anchor="middle">
    <text x="600" y="636">Descomplique o marketing do seu negócio com a inteligência da</text>
    <text x="600" y="666">plataforma Simpool. Comece a escalar hoje mesmo, sem</text>
    <text x="600" y="696">burocracia.</text>
  </g>
</svg>
