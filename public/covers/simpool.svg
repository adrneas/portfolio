<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Simpool landing page hero cover">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0f6ff"/>
      <stop offset=".36" stop-color="#fff"/>
      <stop offset="1" stop-color="#fff7f1"/>
    </linearGradient>
    <radialGradient id="glow" cx=".55" cy=".48" r=".62">
      <stop offset="0" stop-color="#ff7a2f" stop-opacity=".18"/>
      <stop offset=".48" stop-color="#ff7a2f" stop-opacity=".05"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#111" flood-opacity=".08"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#f5f5f0"/>
  <g filter="url(#soft-shadow)">
    <rect x="42" y="80" width="1116" height="640" rx="22" fill="url(#bg)"/>
    <rect x="42" y="80" width="1116" height="640" rx="22" fill="url(#glow)"/>

    <g transform="translate(84 112)">
      <rect width="29" height="29" rx="9" fill="#ff5c00"/>
      <text x="14.5" y="20" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle">S</text>
      <text x="39" y="21" fill="#1f1f1f" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">SIMPOOL</text>
    </g>

    <g fill="#1f1f1f" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="520">
      <text x="470" y="133">Soluções</text>
      <text x="555" y="133">Recursos</text>
      <text x="645" y="133">Preços</text>
      <text x="999" y="133">Login</text>
    </g>

    <g transform="translate(1046 108)">
      <rect width="123" height="42" rx="21" fill="#1f1f1f"/>
      <text x="61.5" y="27" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle">Entrar Agora</text>
    </g>

    <g transform="translate(464 250)">
      <rect width="284" height="36" rx="18" fill="#fff" stroke="#e8e8e8"/>
      <path d="M22 18h11m-5.5-5.5v11m-10-5.5h4m-2-2v4m16-2h4m-2-2v4" fill="none" stroke="#ff5c00" stroke-width="2" stroke-linecap="round"/>
      <text x="46" y="23" fill="#696969" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="560">Sua comunicação em perfeita sincronia</text>
    </g>

    <g font-family="Inter, Arial, sans-serif" font-size="84" font-weight="900" letter-spacing="-3" text-anchor="middle">
      <text x="600" y="400" fill="#1f1f1f">WhatsApp, E-mail e</text>
      <text x="445" y="486" fill="#1f1f1f">SMS em um</text>
      <text x="755" y="486" fill="#ff762b">único</text>
      <text x="600" y="572" fill="#ff762b">fluxo<tspan fill="#1f1f1f">.</tspan></text>
    </g>
